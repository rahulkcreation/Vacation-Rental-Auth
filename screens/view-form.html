<!DOCTYPE html>
<html lang="en" class="amh-html">

<head class="amh-head">
    <meta charset="UTF-8" class="amh-meta-charset">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" class="amh-meta-viewport">
    <title class="amh-title">Application Review</title>

    <style class="amh-style">
        /* --- User Provided Variables --- */
        :root {
            /* Primary colors */
            --am-d-primary: #F15E74;
            --am-d-secondary: #2C3E50;
            --am-d-accent: #2563eb;
            --am-d-bg: #FAFAFA;
            --am-d-text: #000000;

            /* Status colors */
            --am-d-success: #16a34a;
            --am-d-warning: #f59e0b;
            --am-d-error: #ea0124;

            /* UI colors */
            --am-d-white: #ffffff;
            --am-d-card-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            --am-d-border-light: #e9eef3;
            --am-d-border-default: #e2e8f0;
            --am-d-grey-light-text: #5a6e7c;

            /* Light BGS */
            --am-d-light-yellow-bg: #fff2dc;
            --am-d-light-red-bg: #ffe6ea;
            --am-d-light-green-bg: #d5ffe5;
        }

        /* --- Global Reset & Base Styles --- */
        .amh-body {
            margin: 0;
            padding: 0;
            background-color: var(--am-d-bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--am-d-text);
            -webkit-font-smoothing: antialiased;
        }

        .amh-main-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Top Header Styles --- */
        .amh-top-header {
            padding: 1.5rem 2rem;
            background-color: var(--am-d-bg);
        }

        .amh-top-title {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--am-d-text);
        }

        /* --- Content Container --- */
        .amh-content-container {
            display: flex;
            justify-content: center;
            padding: 1rem;
            flex: 1;
        }

        /* --- Main Card Layout --- */
        .amh-review-card {
            background-color: var(--am-d-white);
            width: 100%;
            max-width: 650px;
            border-radius: 12px;
            box-shadow: var(--am-d-card-shadow);
            padding: 2rem;
            border: 1px solid var(--am-d-border-light);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            /* Consistent spacing between sections */
        }

        /* --- Card Header (Back, Title, ID) --- */
        .amh-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--am-d-border-default);
            padding-bottom: 1rem;
        }

        .amh-header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .amh-btn-back {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--am-d-secondary);
            border-radius: 50%;
            transition: background-color 0.2s ease;
        }

        .amh-btn-back:hover {
            background-color: var(--am-d-border-light);
        }

        .amh-card-title {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .amh-header-right {
            display: flex;
            align-items: center;
        }

        .amh-id-text {
            font-size: 0.875rem;
            color: var(--am-d-grey-light-text);
            font-weight: 500;
        }

        /* --- Profile Section --- */
        .amh-profile-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .amh-avatar-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--am-d-light-red-bg);
            color: var(--am-d-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .amh-profile-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .amh-profile-name {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 600;
        }

        .amh-profile-username {
            margin: 0;
            font-size: 0.875rem;
            color: var(--am-d-grey-light-text);
        }

        /* --- Contact Details Section --- */
        .amh-details-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .amh-detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.75rem;
            border-bottom: 1px dashed var(--am-d-border-default);
            flex-wrap: wrap;
            /* Allows wrapping on very small screens */
            gap: 0.5rem;
        }

        .amh-detail-label {
            font-size: 0.875rem;
            color: var(--am-d-grey-light-text);
        }

        .amh-detail-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--am-d-secondary);
        }

        /* --- Document Section --- */
        .amh-docs-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .amh-section-title {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            color: var(--am-d-secondary);
        }

        .amh-doc-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .amh-doc-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background-color: var(--am-d-bg);
            border: 1px solid var(--am-d-border-default);
            border-radius: 8px;
            transition: border-color 0.2s ease;
        }

        .amh-doc-item:hover {
            border-color: var(--am-d-primary);
        }

        .amh-doc-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .amh-doc-name {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--am-d-secondary);
        }

        .amh-btn-view {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--am-d-secondary);
            padding: 0.25rem;
            display: flex;
            align-items: center;
            transition: color 0.2s ease;
        }

        .amh-btn-view:hover {
            color: var(--am-d-primary);
        }

        /* --- Status Section --- */
        .amh-status-section {
            display: flex;
            gap: 0.75rem;
            justify-content: space-between;
            align-items: center;
        }

        .amh-status-badge-wrapper {
            display: flex;
            align-items: center;
        }

        .amh-status-badge {
            background-color: var(--am-d-light-yellow-bg);
            color: var(--am-d-warning);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            display: inline-block;
        }

        /* --- Action Button Section --- */
        .amh-action-section {
            display: flex;
            justify-content: center;
            padding-top: 1rem;
        }

        .amh-btn-update {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--am-d-primary);
            color: var(--am-d-white);
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            transition: color 0.2s ease, transform 0.1s ease;
            width: 100%;
            justify-content: center;
        }

        .amh-btn-update:hover {
            transform: translateY(-2px);
        }

        .amh-btn-update:active {
            transform: translateY(0);
        }

        /* --- SVG Icons Setup --- */
        .amh-icon {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* --- Responsive Queries --- */

        /* Tablet (768px) */
        @media (max-width: 768px) {
            .amh-review-card {
                padding: 1.5rem;
                border-radius: 8px;
            }

            .amh-card-header {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                gap: 0.75rem;
            }

            .amh-header-left {
                width: auto;
            }

            .amh-header-right {
                padding-left: 0;
            }

            .amh-top-title {
                font-size: 1.125rem;
            }

            .amh-card-title {
                font-size: 1rem;
            }

            .amh-profile-section {
                flex-direction: row;
                align-items: center;
            }

            .amh-avatar-circle {
                width: 45px;
                height: 45px;
                font-size: 1rem;
            }

            .amh-profile-name {
                font-size: 1rem;
            }

            .amh-profile-username {
                font-size: 0.8125rem;
            }

            .amh-detail-row {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding-bottom: 0.5rem;
            }

            .amh-detail-label {
                font-size: 0.8125rem;
            }

            .amh-detail-value {
                font-size: 0.875rem;
            }

            .amh-section-title {
                font-size: 0.9375rem;
            }

            .amh-doc-item {
                padding: 0.625rem 0.875rem;
            }

            .amh-doc-name {
                font-size: 0.8125rem;
            }

            .amh-status-badge {
                font-size: 0.8125rem;
                padding: 0.375rem 0.875rem;
            }

            .amh-btn-update {
                font-size: 0.9375rem;
                padding: 0.625rem 1.25rem;
            }
        }

        /* Mobile (480px) */
        @media (max-width: 480px) {
            .amh-review-card {
                padding: 1rem;
                border-radius: 0;
                border: none;
                box-shadow: none;
                background-color: transparent;
                gap: 1.5rem;
            }

            .amh-top-header {
                padding: 0.75rem 1rem;
            }

            .amh-top-title {
                font-size: 1rem;
            }

            .amh-content-container {
                padding: 0;
            }

            .amh-card-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
                padding-bottom: 0.75rem;
            }

            .amh-header-left {
                width: 100%;
            }

            .amh-header-right {
                padding-left: 2.5rem;
                width: 100%;
            }

            .amh-btn-back {
                padding: 0.375rem;
            }

            .amh-icon {
                width: 16px;
                height: 16px;
            }

            .amh-card-title {
                font-size: 0.9375rem;
            }

            .amh-profile-section {
                flex-direction: row;
                gap: 0.75rem;
            }

            .amh-avatar-circle {
                width: 40px;
                height: 40px;
                font-size: 0.875rem;
            }

            .amh-profile-info {
                gap: 0.125rem;
            }

            .amh-profile-name {
                font-size: 0.9375rem;
            }

            .amh-profile-username {
                font-size: 0.75rem;
            }

            .amh-details-section {
                gap: 0.75rem;
            }

            .amh-detail-row {
                align-items: flex-start;
                gap: 0.25rem;
                padding-bottom: 0.5rem;
            }

            .amh-detail-label {
                font-size: 0.75rem;
            }

            .amh-detail-value {
                font-size: 0.8125rem;
                word-break: break-all;
            }

            .amh-docs-section {
                gap: 0.75rem;
            }

            .amh-section-title {
                font-size: 0.875rem;
            }

            .amh-doc-list {
                gap: 0.5rem;
            }

            .amh-doc-item {
                padding: 0.5rem 0.75rem;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }

            .amh-doc-left {
                gap: 0.75rem;
            }

            .amh-doc-name {
                font-size: 0.75rem;
            }

            .amh-status-section {
                gap: 0.5rem;
            }

            .amh-status-badge {
                font-size: 0.75rem;
                padding: 0.3125rem 0.75rem;
            }

            .amh-action-section {
                padding-top: 0.75rem;
            }

            .amh-btn-update {
                font-size: 0.875rem;
                padding: 0.5625rem 1.125rem;
                width: 100%;
                justify-content: center;
            }

            .amh-btn-text {
                font-size: 0.875rem;
            }
        }

        /* Small Mobile (360px) */
        @media (max-width: 360px) {
            .amh-review-card {
                padding: 0.75rem;
            }

            .amh-profile-section {
                align-items: flex-start;
                text-align: left;
            }

            .amh-doc-item {
                gap: 0.5rem;
            }

            .amh-doc-left {
                width: 100%;
                justify-content: flex-start;
            }

            .amh-btn-view {
                align-self: flex-end;
            }
        }
    </style>
</head>

<body class="amh-body">

    <div class="amh-main-wrapper">



        <!-- Main Content Area -->

                        <span class="amh-detail-value">ss4244510@gmail.com</span>

                        <!-- Doc Item 2 -->
                        <div class="amh-doc-item">
                            <div class="amh-doc-left">
                                <svg class="amh-icon amh-icon-file" viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
